default: &default
  adapter: postgresql
  encoding: unicode
  host: postgres-service
  username: postgres
  password: password
  port: 5432
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: localhost
  database: ror_app_development

test:
  <<: *default
  host: localhost
  database: ror_app_test

production:
  <<: *default
  database: ror_app_production
  url: <%= ENV["DATABASE_URL"] %>
